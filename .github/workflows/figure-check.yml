name: Figure Check

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.qmd'

jobs:
  check-figures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for publication figures in completed chapters
        run: |
          echo "Checking completed chapters for save_pub_fig() or fig-cap..."
          missing=()
          skipped=0
          checked=0
          for f in $(find . -name "*.qmd" \
            -not -path "./appendices/*" \
            -not -path "./index.qmd" \
            -not -path "./CHAPTER_TEMPLATE.qmd"); do
            # Skip stub chapters (those still containing TODO placeholders)
            if grep -qE "<!-- TODO:" "$f"; then
              skipped=$((skipped + 1))
              continue
            fi
            checked=$((checked + 1))
            if ! grep -qE "(save_pub_fig|fig-cap)" "$f"; then
              missing+=("$f")
            fi
          done

          echo "Chapters checked: $checked"
          echo "Stubs skipped: $skipped"

          if [ ${#missing[@]} -gt 0 ]; then
            echo ""
            echo "WARNING: The following completed chapters may be missing publication figures:"
            printf '  %s\n' "${missing[@]}"
            echo "::warning::Some completed chapters may lack publication-ready figures"
          else
            echo "All completed chapters have figures (or are still stubs)."
          fi
