name: Citation Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'references.bib'
      - '**/*.qmd'

jobs:
  check-citations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        run: |
          install.packages(c("httr2", "bibtex"))
        shell: Rscript {0}

      - name: Verify DOIs and arXiv IDs
        run: |
          library(httr2)
          bib <- readLines("references.bib")
          doi_lines <- grep("doi\\s*=", bib, value = TRUE, ignore.case = TRUE)
          dois <- gsub(".*\\{(.+)\\}.*", "\\1", doi_lines)
          dois <- trimws(dois)
          dois <- dois[nchar(dois) > 0]

          failed <- character(0)
          for (d in dois) {
            url <- paste0("https://doi.org/", d)
            tryCatch({
              resp <- request(url) |> req_method("HEAD") |> req_perform()
              if (resp_status(resp) >= 400) {
                failed <- c(failed, d)
              }
            }, error = function(e) {
              failed <<- c(failed, d)
            })
          }

          if (length(failed) > 0) {
            cat("FAILED DOIs:\n")
            cat(paste("-", failed, collapse = "\n"), "\n")
            quit(status = 1)
          } else {
            cat("All DOIs verified.\n")
          }
        shell: Rscript {0}
