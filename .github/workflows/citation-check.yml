name: Verify citations

on:
  push:
    paths:
      - 'book.bib'
      - 'scripts/verify-citations.R'
  pull_request:
    paths:
      - 'book.bib'
      - 'scripts/verify-citations.R'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        run: Rscript -e 'install.packages(c("bibtex","httr2","purrr"))'

      - name: Verify
        run: Rscript scripts/verify-citations.R
