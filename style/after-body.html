<!-- Dark/light mode toggle -->
<div class="sticky-item">
  <button type="button" id="mode-switch" class="btn-circle-mode" aria-label="Toggle dark mode">
    <i class="fa-solid fa-circle-half-stroke" aria-hidden="true"></i>
  </button>
</div>

<script>
  (function () {
    var stored = localStorage.getItem('themeMode');
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var initial = stored || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', initial);

    document.addEventListener('DOMContentLoaded', function () {
      var btn = document.getElementById('mode-switch');
      if (!btn) return;
      btn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('themeMode', next);
      });
    });
  })();
</script>

<!-- Download links injected into the right sidebar above View source / Edit this page -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    if (document.querySelector(".sidebar-downloads")) return;

    var pageFile  = window.location.pathname.split("/").pop();
    var chapterId = pageFile && pageFile !== "" && pageFile !== "index.html"
      ? pageFile.replace(".html", ".pdf")
      : null;

    // Find the "View source / Edit this page" block. bs4_book wraps these in
    // a section with the heading "On this page" + a list, followed by these
    // links inside an <h2> sibling or a separate <ul>. We look for the
    // canonical link text and walk up to its container, then insert before it.
    var anchor = null;
    var candidates = document.querySelectorAll(".sidebar-chapter a, aside a, nav a");
    for (var i = 0; i < candidates.length; i++) {
      var t = (candidates[i].textContent || "").trim().toLowerCase();
      if (t === "view source" || t === "edit this page") {
        anchor = candidates[i].closest("h2, .page-links, div, ul");
        if (anchor) break;
      }
    }
    if (!anchor) return;  // theme variant we don't recognise — skip silently

    var heading = document.createElement("h2");
    heading.className = "sidebar-downloads-heading";
    heading.textContent = "Download";

    var list = document.createElement("ul");
    list.className = "sidebar-downloads";

    function addItem(href, label) {
      var li = document.createElement("li");
      var a  = document.createElement("a");
      a.href = href;
      a.textContent = label;
      li.appendChild(a);
      list.appendChild(li);
    }

    addItem("strategy-in-r.pdf", "Entire book (PDF)");
    if (chapterId) {
      addItem("pdf-chapters/" + chapterId, "This chapter (PDF)");
    }

    anchor.parentNode.insertBefore(heading, anchor);
    anchor.parentNode.insertBefore(list,    anchor);
  });
</script>
