<!-- Dark/light mode toggle -->
<div class="sticky-item">
  <button type="button" id="mode-switch" class="btn-circle-mode" aria-label="Toggle dark mode">
    <i class="fa-solid fa-circle-half-stroke" aria-hidden="true"></i>
  </button>
</div>

<script>
  (function () {
    var stored = localStorage.getItem('themeMode');
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var initial = stored || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', initial);

    document.addEventListener('DOMContentLoaded', function () {
      var btn = document.getElementById('mode-switch');
      if (!btn) return;
      btn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('themeMode', next);
      });
    });
  })();
</script>

<!-- Per-chapter PDF download button -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var path = window.location.pathname.split("/").pop().replace(".html", ".pdf");
    if (!path || path === ".pdf") return;
    var header = document.querySelector("main h1, .page-inner h1");
    if (header && !document.querySelector(".per-chapter-pdf-btn")) {
      var btn = document.createElement("a");
      btn.href = "pdf-chapters/" + path;
      btn.className = "btn btn-sm btn-outline-secondary per-chapter-pdf-btn";
      btn.style = "float:right;margin-top:0.5em;";
      btn.textContent = "⬇ Download this chapter (PDF)";
      header.appendChild(btn);
    }
  });
</script>
