project:
  type: book
  output-dir: _book

book:
  title: "Strategy in R"
  subtitle: "Game Theory, Simulation, and Machine Intelligence"
  author:
    name: "Raban Heller"
    orcid: "0000-0001-8006-9742"
  date: today
  description: "A Quarto book on game theory, simulation, AI/ML, and ethics — implemented end-to-end in R."
  site-url: https://r-heller.github.io/strategy-in-r/
  repo-url: https://github.com/r-heller/strategy-in-r/
  repo-actions: [edit, source, issue]
  search: true
  page-navigation: true
  back-to-top-navigation: true
  # cover-image: images/cover.png   # TODO: add cover art
  # favicon: images/favicon.png     # TODO: add favicon

  chapters:
    - index.qmd
    - 00-introduction.qmd
    - part: "Part I — Foundations of Game Theory"
      chapters:
        - part-1-foundations/01-what-is-a-game.qmd
        - part-1-foundations/02-normal-form.qmd
        - part-1-foundations/03-nash-equilibrium.qmd
        - part-1-foundations/04-mixed-strategies.qmd
        - part-1-foundations/05-extensive-form.qmd
        - part-1-foundations/06-bayesian-games.qmd
        - part-1-foundations/07-repeated-games.qmd
        - part-1-foundations/08-cooperative-gt.qmd
    - part: "Part II — The R Toolkit"
      chapters:
        - part-2-r-toolkit/09-r-environment.qmd
        - part-2-r-toolkit/10-gametheory-package.qmd
        - part-2-r-toolkit/11-coopgame-package.qmd
        - part-2-r-toolkit/12-gtree-package.qmd
        - part-2-r-toolkit/13-nashpy-via-reticulate.qmd
        - part-2-r-toolkit/14-custom-solvers.qmd
    - part: "Part III — Simulation"
      chapters:
        - part-3-simulation/15-monte-carlo.qmd
        - part-3-simulation/16-agent-based-models.qmd
        - part-3-simulation/17-axelrod-tournament.qmd
        - part-3-simulation/18-spatial-pd.qmd
        - part-3-simulation/19-replicator-dynamics.qmd
        - part-3-simulation/20-evolutionary-stable-strategies.qmd
        - part-3-simulation/21-network-games.qmd
        - part-3-simulation/22-performance-rcpp.qmd
    - part: "Part IV — AI and Machine Learning"
      chapters:
        - part-4-ai-ml/23-ml-foundations-for-gt.qmd
        - part-4-ai-ml/24-reinforcement-learning.qmd
        - part-4-ai-ml/25-q-learning-in-games.qmd
        - part-4-ai-ml/26-multi-agent-rl.qmd
        - part-4-ai-ml/27-self-play-alphazero.qmd
        - part-4-ai-ml/28-cfr-poker.qmd
        - part-4-ai-ml/29-gans-as-minmax.qmd
        - part-4-ai-ml/30-llm-agents-and-strategy.qmd
    - part: "Part V — Applications"
      chapters:
        - part-5-applications/31-auctions.qmd
        - part-5-applications/32-mechanism-design.qmd
        - part-5-applications/33-matching-markets.qmd
        - part-5-applications/34-bargaining.qmd
        - part-5-applications/35-conflict-cooperation.qmd
        - part-5-applications/36-empirical-case-studies.qmd
    - part: "Part VI — Ethics and the Future"
      chapters:
        - part-6-ethics/37-ethics-frameworks.qmd
        - part-6-ethics/38-fairness-in-ml.qmd
        - part-6-ethics/39-ai-alignment-as-game.qmd
        - part-6-ethics/40-cooperative-ai.qmd
        - part-6-ethics/41-future-of-strategy.qmd
  appendices:
    - appendices/A-r-refresher.qmd
    - appendices/B-linear-algebra.qmd
    - appendices/C-probability.qmd
    - appendices/D-solutions.qmd
    - appendices/E-glossary.qmd

bibliography: references.bib
csl: https://www.zotero.org/styles/apa

format:
  html:
    theme:
      light: [cosmo]
      dark: [darkly]
    css: styles.css
    toc: true
    toc-depth: 3
    code-fold: false
    code-tools: true
    code-link: true
    fig-cap-location: bottom
    tbl-cap-location: top
    citations-hover: true
    crossrefs-hover: true
  pdf:
    documentclass: scrbook
    classoption: [twoside, openright]
    papersize: a4
    geometry:
      - top=25mm
      - bottom=25mm
      - inner=30mm
      - outer=25mm
    include-in-header: preamble.tex
    keep-tex: true
    fig-pos: 'H'
    cite-method: biblatex
    biblio-style: apa
  epub:
    toc: true

execute:
  freeze: auto
  warning: false
  message: false
  echo: true
